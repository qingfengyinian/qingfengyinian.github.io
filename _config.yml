# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve`. If you change this file, please restart the server process.

# ===== Site Settings =====
title                    : "Xin Ma"
description              : "Hi, welcome to my homepage!"
repository               : "qingfengyinian/qingfengyinian.github.io"   # 你的 GitHub: 用户名/仓库名（仓库名应为 用户名.github.io）
google_scholar_stats_use_cdn : false

# Google Analytics（可选，留空即不启用）
google_analytics_id      :  # 从 https://analytics.google.com/analytics/ 获取

# SEO 相关（可选，留空即可；以后想做搜索引擎收录再填）
google_site_verification :  # 从 https://search.google.com/search-console/about 获取
bing_site_verification   :  # 从 https://www.bing.com/webmasters/about 获取
baidu_site_verification  :  # 从 https://ziyuan.baidu.com/login/index?u=/site/index 获取

# ===== Site Author =====
author:
  name             : "Xin Ma"
  avatar           : "images/profile.jpg"
  bio              : "M.S. Student @ USTC"
  location         : "Hefei, China"
  employer         :                        # 留空：侧边栏地址只显示 location（Hefei, China）
  cv               :                        # 以后有 CV 链接（如 Google Drive / 个人 PDF）再填
  pubmed           :
  googlescholar    : "https://scholar.google.com/"   # TODO: 注册 Google Scholar 后换成你的主页链接
  email            : "xinma@mail.ustc.edu.cn"
  researchgate     :
  uri              :
  bitbucket        :
  codepen          :
  dribbble         :
  flickr           :
  facebook         :
  foursquare       :
  github           : "qingfengyinian"        # 你的 GitHub 用户名
  google_plus      :
  keybase          :
  instagram        :
  impactstory      :
  lastfm           :
  linkedin         :
  dblp             :                        # 以后有 DBLP 链接再填
  orcid            :
  pinterest        :
  soundcloud       :
  stackoverflow    :
  steam            :
  tumblr           :
  twitter          :
  vine             :
  weibo            :
  xing             :
  youtube          :
  wikipedia        :

# ===== Reading Files =====
include:
  - .htaccess
  - _pages
  - files
exclude:
  - docs
  - google_scholar_crawler
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - .github
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gemfile.orig.bak
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# ===== Conversion =====
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false


# ===== Markdown Processing =====
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# ===== Defaults =====
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      author_profile: true


# ===== Sass/SCSS =====
sass:
  sass_dir: _sass
  style: compressed


# ===== Outputting =====
permalink: /:categories/:title/
timezone: Asia/Shanghai


# ===== Plugins =====
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji


# ===== HTML Compression =====
compress_html:
  clippings: all
  ignore:
    envs: development
